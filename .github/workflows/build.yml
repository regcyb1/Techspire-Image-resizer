name: Build Executables

on:
  push:
    tags:
      - 'v*'      # Trigger on version tags (e.g. v1.0.0)
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ImageResizer-Linux
            asset_name: ImageResizer-Linux
          - os: windows-latest
            artifact_name: ImageResizer-Windows.exe
            asset_name: ImageResizer-Windows.exe
          - os: macos-latest
            artifact_name: ImageResizer-macOS
            asset_name: ImageResizer-macOS
            
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 3.11 is very stable for PyInstaller

      - name: Install PyTorch (CPU)
        # For standalone apps, CPU-only PyTorch is much smaller (~200MB vs ~2GB)
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install gradio Pillow pyinstaller
          pip install -r requirements.txt

      - name: Build Executable
        run: python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/ImageResizer-Linux/ImageResizer-Linux
            dist/ImageResizer-Windows.exe/ImageResizer-Windows.exe
            dist/ImageResizer-macOS/ImageResizer-macOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
